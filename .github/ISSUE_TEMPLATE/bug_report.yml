name: Bug Report
description: Create a report to help us improve the educational baseline.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        *Reminder: This project aims to be a pure, from-scratch PyTorch implementation. Please do not suggest fixes that require adding high-level wrappers like Stable-Baselines3.*
  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: E.g., The Bellman update in double_dqn_agent.py throws a Tensor shape mismatch...
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Run 'make train'
        2. Wait until step 10,000
        3. See error
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: E.g., Ubuntu 22.04, Windows 11
    validations:
      required: true
